<h2>Chat Interface — Prototype Layout</h2>
<p class="subtitle">How the user interacts with the agent</p>

<div class="mockup" style="max-width:480px;margin:0 auto;">
  <div class="mockup-header">Message Agent</div>
  <div class="mockup-body" style="padding:0;display:flex;flex-direction:column;height:420px;">

    <!-- Message history -->
    <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">

      <!-- Agent welcome -->
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <div style="width:28px;height:28px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;flex-shrink:0;">A</div>
        <div style="background:#1e1e2e;border:1px solid #2e2e3e;border-radius:0 12px 12px 12px;padding:10px 14px;font-size:13px;color:#cdd6f4;max-width:80%;">
          Hi! Who should I message and what should I say?
        </div>
      </div>

      <!-- User instruction -->
      <div style="display:flex;gap:8px;align-items:flex-start;flex-direction:row-reverse;">
        <div style="width:28px;height:28px;border-radius:50%;background:#313244;display:flex;align-items:center;justify-content:center;font-size:12px;color:#cdd6f4;flex-shrink:0;">U</div>
        <div style="background:#6366f1;border-radius:12px 0 12px 12px;padding:10px 14px;font-size:13px;color:white;max-width:80%;">
          Send John a reminder about tomorrow's meeting at 10am
        </div>
      </div>

      <!-- Agent thinking -->
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <div style="width:28px;height:28px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;flex-shrink:0;">A</div>
        <div style="background:#1e1e2e;border:1px solid #2e2e3e;border-radius:0 12px 12px 12px;padding:10px 14px;font-size:13px;color:#a6adc8;max-width:80%;display:flex;align-items:center;gap:8px;">
          <span>Sending via Messenger</span>
          <span style="display:inline-flex;gap:3px;">
            <span style="width:6px;height:6px;border-radius:50%;background:#6366f1;animation:pulse 1s infinite;"></span>
            <span style="width:6px;height:6px;border-radius:50%;background:#6366f1;animation:pulse 1s infinite 0.2s;"></span>
            <span style="width:6px;height:6px;border-radius:50%;background:#6366f1;animation:pulse 1s infinite 0.4s;"></span>
          </span>
        </div>
      </div>

    </div>

    <!-- Input bar -->
    <div style="border-top:1px solid #2e2e3e;padding:12px;display:flex;gap:8px;background:#181825;">
      <input class="mock-input" placeholder="Tell me who to message and what to say…" style="flex:1;font-size:13px;" />
      <button class="mock-button" style="padding:8px 16px;font-size:13px;">Send</button>
    </div>
  </div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.1); }
}
</style>
